version: "3.8"

services:
  influxdb:
    image: influxdb:2.7
    container_name: power-twin-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123456
      DOCKER_INFLUXDB_INIT_ORG: power-twin
      DOCKER_INFLUXDB_INIT_BUCKET: power_telemetry
      DOCKER_INFLUXDB_INIT_RETENTION: 30d
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: power-twin-admin-token-2024
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: power-twin-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "healthcheck", "-m", "ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: power-twin-backend
    ports:
      - "8080:8080"
      - "61850:61850"
    environment:
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: power-twin-admin-token-2024
      INFLUXDB_ORG: power-twin
      INFLUXDB_BUCKET: power_telemetry
      MQTT_BROKER: tcp://mosquitto:1883
      TCP_LISTEN_ADDR: 0.0.0.0:61850
      HTTP_LISTEN_ADDR: 0.0.0.0:8080
    depends_on:
      influxdb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: power-twin-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8080/ws
    depends_on:
      - backend
    restart: unless-stopped

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    container_name: power-twin-simulator
    environment:
      SIM_HOST: backend
      SIM_PORT: 61850
      SIM_INTERVAL: 1.0
      SIM_FAULT_MODE: "false"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  influxdb-data:
    driver: local
  mosquitto-data:
    driver: local
  mosquitto-log:
    driver: local
